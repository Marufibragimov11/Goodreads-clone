{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

  <h1>Profile edit</h1>

  <div class="row">
      <div class="col-3">
          <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          {{ form | crispy }}

          <button class="btn btn-primary" type="submit">Save changes</button>
          </form>
      </div>
  </div>

{% endblock %}
